// 미리보기 렌더링
const grid = document.getElementById('previewGrid');
Object.entries(PHOTOS).forEach(([name, src]) => {
    const d = document.createElement('div');
    d.className = 'face-item';
    d.innerHTML = `<img src="${src}"><div>${name}</div>`;
    grid.appendChild(d);
});

function log(msg, cls='') {
    const el = document.getElementById('log');
    el.innerHTML += `<span class="${cls}">${msg}</span>`;
    el.scrollTop = el.scrollHeight;
}

window.runUpdate = async function() {
    const btn = document.getElementById('btn');
    btn.disabled = true;
    document.getElementById('prog').style.display = 'block';
    document.getElementById('log').innerHTML = '';
    
    log('🔐 Firebase 인증 중...', 'yellow');
    try {
        await signInAnonymously(auth);
        log('✅ 인증 성공', 'green');
    } catch(e) {
        log('❌ 인증 실패: ' + e.message, 'red');
        btn.disabled = false; return;
    }
    
    log('📂 현재 roster 불러오는 중...', 'yellow');
    const rosterRef = doc(db, 'roster', 'current');
    let roster;
    try {
        const snap = await getDoc(rosterRef);
        if (!snap.exists()) { log('❌ roster 없음', 'red'); btn.disabled=false; return; }
        roster = snap.data();
        log(`✅ roster 로드: 총 ${roster.list.length}명`, 'green');
    } catch(e) {
        log('❌ roster 로드 실패: ' + e.message, 'red');
        btn.disabled=false; return;
    }
    
    const prog = document.getElementById('prog');
    let matched = 0, unmatched = [];
    
    const newList = roster.list.map(member => {
        const photo = PHOTOS[member.name];
        if (photo) {
            matched++;
            log(`✓ ${member.name}`, 'green');
            return { ...member, photo };
        } else {
            unmatched.push(member.name);
            return member;
        }
    });
    
    prog.value = 50;
    log(`\n📸 매칭: ${matched}명 / 미매칭: ${unmatched.length}명`, 'yellow');
    if (unmatched.length > 0) log(`  미매칭: ${unmatched.join(', ')}`, 'red');
    
    log('💾 Firebase 저장 중...', 'yellow');
    try {
        await setDoc(rosterRef, { list: newList });
        prog.value = 76;
        log(`\n🎉 완료! ${matched}명 사진 업데이트 성공!`, 'green');
        document.getElementById('statusMsg').className = 'status ok';
        document.getElementById('statusMsg').textContent = `✅ ${matched}명 사진 업데이트 완료!`;
    } catch(e) {
        log('❌ 저장 실패: ' + e.message, 'red');
    }
    
    btn.disabled = false;
    btn.textContent = '🔄 다시 업데이트';
};
</script>
