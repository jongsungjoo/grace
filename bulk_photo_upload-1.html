<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주은혜 찬양 사역팀 - 단체 사진 자동 크롭 및 일괄 업데이트</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  
  // ⚠️ 여기에 기존에 사용하시던 Firebase 설정(firebaseConfig)을 그대로 넣어주세요.
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 전역 변수로 할당하여 UI 이벤트에서 사용 가능하도록 함
  window.db = db;
  window.doc = doc;
  window.getDoc = getDoc;
  window.setDoc = setDoc;
</script>

<script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

<style>
  body { font-family: sans-serif; background: #f8faff; padding: 20px; max-width: 800px; margin: 0 auto; }
  h2 { color: #193278; }
  .card { background: white; border-radius: 16px; padding: 20px; margin: 12px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  button { background: #193278; color: white; border: none; padding: 14px 28px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
  button:disabled { background: #93c5fd; cursor: not-allowed; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
  .face-card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; text-align: center; }
  .face-card img { width: 100%; border-radius: 8px; margin-bottom: 10px; }
  .face-card select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; }
  #logBox { background: #1e293b; color: #a7f3d0; padding: 15px; border-radius: 8px; font-family: monospace; height: 150px; overflow-y: auto; font-size: 13px; }
</style>
</head>
<body>

  <h2>📸 단체 사진 자동 크롭 및 업로드</h2>
  
  <div class="card">
    <p>1. 단체 사진을 선택하면 얼굴을 자동으로 인식하여 잘라냅니다.</p>
    <input type="file" id="imageInput" accept="image/*" style="margin-bottom: 10px;">
    <button id="processBtn" onclick="processImage()" disabled>얼굴 인식 중... (모델 로딩 대기)</button>
  </div>

  <div class="card" id="facesContainer" style="display: none;">
    <p>2. 인식된 얼굴에 대원을 매칭한 후 업로드하세요.</p>
    <div class="grid" id="facesGrid"></div>
    <button id="uploadBtn" onclick="uploadToFirebase()">🚀 Firebase에 일괄 업로드</button>
  </div>

  <div class="card">
    <h3>진행 상황 로그</h3>
    <div id="logBox"></div>
  </div>

<script>
  let teamRoster = [];
  let croppedFaces = []; // { dataUrl, matchedName }

  function log(msg) {
    const box = document.getElementById('logBox');
    box.innerHTML += `<div>${msg}</div>`;
    box.scrollTop = box.scrollHeight;
  }

  // 1. Face API 모델 로드 및 명단 불러오기
  window.onload = async () => {
    log('⏳ Face API AI 모델 로드 중...');
    try {
      // 🚨 수정된 부분: 가장 안정적인 vladmandic 공식 CDN 모델 경로 사용
      const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
      await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
      
      log('✅ AI 모델 로드 완료!');
      document.getElementById('processBtn').disabled = false;
      document.getElementById('processBtn').innerText = '단체 사진에서 얼굴 찾기';
      
      // Firebase에서 명단(Roster) 불러오기 (매칭용 드롭다운 구성)
      setTimeout(loadRoster, 1500); 
    } catch (e) {
      log('❌ 초기화 오류: ' + e.message);
      console.error("Model Load Error:", e);
    }
  };

  async function loadRoster() {
    log('⏳ Firebase에서 명단 로드 중...');
    try {
      const rosterRef = window.doc(window.db, 'roster', 'current');
      const snap = await window.getDoc(rosterRef);
      if (snap.exists()) {
        teamRoster = snap.data().list;
        log(`✅ 명단 로드 완료: 총 ${teamRoster.length}명`);
      } else {
        log('❌ 명단을 찾을 수 없습니다.');
      }
    } catch (e) {
      log('❌ Firebase 통신 오류: 설정값을 확인해주세요. (' + e.message + ')');
    }
  }

  // 2. 사진에서 얼굴 찾기 및 크롭
  async function processImage() {
    const fileInput = document.getElementById('imageInput');
    if (!fileInput.files) { alert('사진을 먼저 선택해주세요!'); return; }

    log('🔍 사진 분석 및 얼굴 크롭 시작...');
    const imgElement = await faceapi.bufferToImage(fileInput.files);
    
    // 얼굴 인식 실행
    const detections = await faceapi.detectAllFaces(imgElement, new faceapi.TinyFaceDetectorOptions());
    log(`✅ 총 ${detections.length}명의 얼굴을 찾았습니다.`);

    const facesGrid = document.getElementById('facesGrid');
    facesGrid.innerHTML = '';
    croppedFaces = [];

    // 대원 선택 드롭다운 HTML 생성
    const optionsHtml = `<option value="">-- 대원 선택 --</option>` + 
      teamRoster.map(m => `<option value="${m.name}">${m.name}</option>`).join('');

    detections.forEach((detection, i) => {
      const box = detection.box;
      
      // 첨부해주신 샘플처럼 꽉 차게 보이기 위해 여백(Padding) 추가 계산
      const padX = box.width * 0.15;
      const padY = box.height * 0.25; 
      const x = Math.max(0, box.x - padX);
      const y = Math.max(0, box.y - padY * 1.5); 
      const width = Math.min(imgElement.width - x, box.width + padX * 2);
      const height = Math.min(imgElement.height - y, box.height + padY * 2.5);

      // 캔버스에 잘라내기
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(imgElement, x, y, width, height, 0, 0, width, height);
      
      const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
      croppedFaces.push({ id: i, dataUrl: dataUrl, name: "" });

      // 화면에 표시
      const card = document.createElement('div');
      card.className = 'face-card';
      card.innerHTML = `
        <img src="${dataUrl}" alt="face">
        <select onchange="updateFaceName(${i}, this.value)">
          ${optionsHtml}
        </select>
      `;
      facesGrid.appendChild(card);
    });

    document.getElementById('facesContainer').style.display = 'block';
  }

  // 사용자가 드롭다운에서 이름을 선택할 때마다 배열 업데이트
  window.updateFaceName = function(index, name) {
    croppedFaces[index].name = name;
  }

  // 3. Firebase에 최종 업데이트
  window.uploadToFirebase = async function() {
    // 매칭된 얼굴들만 필터링
    const matchedFaces = croppedFaces.filter(f => f.name !== "");
    if (matchedFaces.length === 0) { alert('매칭된 대원이 없습니다!'); return; }

    log('💾 Firebase 업데이트 진행 중...');
    
    // 기존 명단에 사진 데이터 병합
    const newList = teamRoster.map(member => {
      const faceMatch = matchedFaces.find(f => f.name === member.name);
      if (faceMatch) {
        log(`✓ ${member.name} 사진 매칭됨`);
        return { ...member, photo: faceMatch.dataUrl };
      }
      return member;
    });

    try {
      const rosterRef = window.doc(window.db, 'roster', 'current');
      await window.setDoc(rosterRef, { list: newList });
      log(`🎉 업데이트 완료! 총 ${matchedFaces.length}명의 사진이 등록되었습니다.`);
      alert('성공적으로 업로드되었습니다!');
    } catch(e) {
      log('❌ 업로드 실패: ' + e.message);
    }
  }
</script>
</body>
</html>
