                            <button onClick={() => { if (!form.name.trim()) return; onSave(form); }}
                                className="flex-[2] bg-[#193278] text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-transform">저장</button>
                        </div>
                    </div>
                </div>
            );
        };

        const ManageView = ({ members, currentPassword, requestAuth, showToast, geminiApiKey, onSaveGeminiKey }) => {
            const [partFilter, setPartFilter] = useState('all');
            const [statusFilter, setStatusFilter] = useState('active');
            const [editingMember, setEditingMember] = useState(null); // null=closed, false=new, obj=edit
            const [pwdForm, setPwdForm] = useState({ current: '', next: '', confirm: '' });
            const [showPwdSetting, setShowPwdSetting] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [apiForm, setApiForm] = useState(geminiApiKey || "");

            const statusNorm = m => m.status === 'inactive' ? 'sabbatical' : (m.status || 'active');

            const saveRoster = async (newList) => {
                const { db, doc, setDoc } = window.MyFirebase;
                await setDoc(doc(db, 'roster', 'current'), { list: newList });
            };

            const handleSaveMember = (form) => requestAuth(async () => {
                let newList;
                const data = { name: form.name.trim(), part: form.part, status: form.status, role: form.role.trim(), birthday: form.birthday.trim(), birthdayType: form.birthdayType || 'solar' };
                if (!editingMember) {
                    newList = [...members, data];
                } else {
                    newList = members.map(m => m.name === editingMember.name ? { ...m, ...data } : m);
                }
                await saveRoster(newList);
                showToast(editingMember ? "수정되었습니다." : "팀원이 추가되었습니다.");
                setEditingMember(null);
            });

            const handleDeleteMember = (name) => requestAuth(async () => {
                await saveRoster(members.filter(m => m.name !== name));
                showToast("삭제되었습니다."); setEditingMember(null);
            });

            const handleUpdatePassword = async () => {
                if (pwdForm.current !== currentPassword) return showToast("현재 비밀번호가 일치하지 않습니다.");
                if (pwdForm.next.length < 4) return showToast("비밀번호는 4자리 이상이어야 합니다.");
                if (pwdForm.next !== pwdForm.confirm) return showToast("새 비밀번호 확인이 일치하지 않습니다.");
                const { db, doc, setDoc } = window.MyFirebase;
                try {
                    await setDoc(doc(db, 'settings', 'admin'), { password: pwdForm.next });
                    showToast("비밀번호가 변경되었습니다.");
                    setPwdForm({ current: '', next: '', confirm: '' }); setShowPwdSetting(false);
                } catch (e) { showToast("변경 중 오류가 발생했습니다."); }
            };

            // 레벨 2 필터탭 목록 (성가사/반주자 먼저, 임원진 다음)
            const partTabs = [
                { id: 'all',     name: '전체',          color: '#193278' },
                ...PART_OPTIONS,
                { id: 'officer', name: '임원진',         color: '#7c3aed' },
            ];

            // 상태 카운트
            const counts = {
                active:        members.filter(m => statusNorm(m) === 'active').length,
                short_absence: members.filter(m => statusNorm(m) === 'short_absence').length,
                sabbatical:    members.filter(m => statusNorm(m) === 'sabbatical').length,
            };

            // 레벨1 필터 (상태)
            const byStatus = members.filter(m => statusNorm(m) === statusFilter);

            // 레벨2 필터 (파트/임원)
            let filtered;
            if (partFilter === 'all')          filtered = byStatus;
            else if (partFilter === 'officer') filtered = byStatus.filter(m => m.role && m.role.trim());
            else                               filtered = byStatus.filter(m => m.part === partFilter);

            // 파트별 그룹핑 (일반 모드)
            const grouped = PART_OPTIONS.map(p => ({
                ...p,
                members: filtered.filter(m => m.part === p.id),
            })).filter(g => g.members.length > 0);

            // 임원진 모드 전용 그룹핑
            const PART_ABBR = { staff: '성', soprano: '소', alto: '알', tenor: '테', bass: '베' };
            const getRoleCategory = (role) => {
                if (!role) return 4;
                const r = role.trim();
                if (['팀장','총무','회계'].includes(r)) return 1;
                if (r === '파트장') return 2;
                return 3;
            };
            // 팀장>총무>회계 고정 순서
            const LEAD_ORDER = ['팀장','총무','회계'];
            const officerGroups = (() => {
                const officers = filtered;
                const partOrder = ['soprano','alto','tenor','bass'];
                const staffGroup = {
                    id: 'staff_off', name: '성가사/반주자', color: '#193278',
                    members: officers.filter(m => m.part === 'staff'),
                };
                const leadGroup = {
                    id: 'lead', name: '팀장 · 총무 · 회계', color: '#7c3aed',
                    members: [...officers.filter(m => m.part !== 'staff' && getRoleCategory(m.role) === 1)]
                        .sort((a, b) => {
                            const ai = LEAD_ORDER.indexOf(a.role.trim());
                            const bi = LEAD_ORDER.indexOf(b.role.trim());
                            return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
                        }),
                };
                const partLeaderGroup = {
                    id: 'partleader', name: '파트장', color: '#0ea5e9',
                    members: [...officers.filter(m => m.part !== 'staff' && getRoleCategory(m.role) === 2)]
                        .sort((a, b) => partOrder.indexOf(a.part) - partOrder.indexOf(b.part)),
                    showPartAbbr: true,
                };
                // 담당부장: 같은 직책끼리 묶어서 정렬
                const etcGroup = {
                    id: 'etc', name: '담당부장', color: '#f59e0b',
                    members: [...officers.filter(m => m.part !== 'staff' && getRoleCategory(m.role) === 3)]
                        .sort((a, b) => (a.role || '').localeCompare(b.role || '', 'ko')),
                };
                return [staffGroup, leadGroup, partLeaderGroup, etcGroup].filter(g => g.members.length > 0);
            })();

            // 레벨2 탭별 카운트
            const partCounts = partTabs.reduce((acc, p) => {
                if (p.id === 'all')          acc[p.id] = byStatus.length;
                else if (p.id === 'officer') acc[p.id] = byStatus.filter(m => m.role && m.role.trim()).length;
                else                          acc[p.id] = byStatus.filter(m => m.part === p.id).length;
                return acc;
            }, {});

            // 칩 컴포넌트 — 크기 통일, 임원이면 직책 배지
            const MemberChip = ({ m, showPartAbbr }) => {
                const hasRole = m.role && m.role.trim();
                const statusDots = { active: '#22c55e', short_absence: '#eab308', sabbatical: '#9ca3af' };
                const dot = statusDots[statusNorm(m)] || '#9ca3af';
                const abbr = showPartAbbr ? PART_ABBR[m.part] : null;
                const pt = PART_OPTIONS.find(p => p.id === m.part);
                return (
                    <button
                        onClick={() => requestAuth(() => setEditingMember(m))}
                        className="relative flex flex-col items-center justify-center px-2 py-3 bg-white border-2 rounded-2xl transition-all active:scale-95 hover:shadow-md text-center w-full"
                        style={{ borderColor: hasRole ? '#ede9fe' : '#f1f5f9', minHeight: '76px' }}
                    >
                        <span className="absolute top-2 right-2 w-2 h-2 rounded-full" style={{ backgroundColor: dot }}></span>
                        {hasRole && <span className="absolute top-1.5 left-2 text-[10px]">👑</span>}
                        {/* 파트장일 때 파트 약자 아이콘 */}
                        {abbr && (
                            <span className="absolute bottom-1.5 left-2 text-[9px] font-black px-1 py-0.5 rounded-md text-white leading-none"
                                style={{ backgroundColor: pt?.color || '#193278' }}>{abbr}</span>
                        )}
                        <span className="font-black text-gray-800 text-sm leading-tight">{m.name}</span>
                        {/* 직책 배지 — 항상 공간 확보해서 칩 높이 통일 */}
                        <span className={`mt-1 text-[10px] font-black px-1.5 py-0.5 rounded-full leading-none ${hasRole ? 'bg-purple-50 text-purple-600' : 'text-transparent'}`}>
                            {hasRole ? m.role : '—'}
                        </span>
                    </button>
                );
            };

            return (
                <div className="space-y-4 fade-in text-left">
                    {/* 헤더 */}
                    <div className="flex items-end justify-between">
                        <div>
                            <h2 className="text-3xl font-black text-gray-800">명단관리</h2>
                            <p className="text-sm text-gray-400 font-bold mt-0.5">총 {members.length}명 · 활동 {counts.active}명</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowSettings(!showSettings)}
                                className={`p-3 rounded-2xl transition-colors ${showSettings ? 'bg-[#193278] text-white' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'}`}>
                                <LucideIcon name="settings" className="w-5 h-5" />
                            </button>
                            <button onClick={() => requestAuth(() => setEditingMember(false))}
                                className="flex items-center gap-2 bg-[#193278] text-white px-4 py-3 rounded-2xl font-black text-sm shadow-lg active:scale-95 transition-transform">
                                <LucideIcon name="user-plus" className="w-4 h-4" /> 팀원 추가
                            </button>
                        </div>
                    </div>

                    {/* 레벨 1 — 현황 */}
                    <div>
                        <p className="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-2 px-0.5">현황</p>
                        <div className="flex gap-2">
                            {STATUS_OPTIONS.map(s => (
                                <button key={s.id}
                                    onClick={() => { setStatusFilter(s.id); setPartFilter('all'); }}
                                    className={`flex-1 py-3 rounded-2xl text-xs font-black transition-all flex flex-col items-center gap-0.5 ${statusFilter === s.id ? 'bg-[#193278] text-white shadow-md' : 'bg-white text-gray-400 border border-gray-100'}`}>
                                    <span className="text-lg font-black leading-tight">{counts[s.id]}</span>
                                    <span>{s.label}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* 레벨 2 — 파트 필터 */}
                    <div>
                        <p className="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-2 px-0.5">파트</p>
                        <div className="flex flex-wrap gap-2">
                            {partTabs.map(p => (
                                <button key={p.id}
                                    onClick={() => setPartFilter(p.id)}
                                    className={`px-3 py-1.5 rounded-xl text-xs font-black transition-all border-2 flex items-center gap-1 ${partFilter === p.id ? 'text-white shadow-md' : 'bg-white border-gray-100 text-gray-500'}`}
                                    style={partFilter === p.id ? { backgroundColor: p.color, borderColor: p.color } : {}}
                                >
                                    {p.id === 'officer' && <span>👑</span>}
                                    {p.name}
                                    <span className={`text-[10px] font-black ml-0.5 ${partFilter === p.id ? 'opacity-60' : 'text-gray-300'}`}>{partCounts[p.id]}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* 멤버 칩 그리드 */}
                    {(partFilter === 'officer' ? officerGroups : grouped).length === 0 ? (
                        <div className="text-center py-14 text-gray-300">
                            <LucideIcon name="users" className="w-12 h-12 mx-auto mb-3 opacity-30" />
                            <p className="font-bold text-sm">해당 팀원이 없습니다.</p>
                        </div>
                    ) : (
                        <div className="space-y-5">
                            {(partFilter === 'officer' ? officerGroups : grouped).map(group => (
                                <div key={group.id}>
                                    <div className="flex items-center gap-2 mb-2 px-0.5">
                                        <span className="w-2 h-4 rounded-full shrink-0" style={{backgroundColor: group.color}}></span>
                                        <span className="text-xs font-black text-gray-500">{group.name}</span>
                                        <span className="text-xs font-bold text-gray-300">{group.members.length}명</span>
                                    </div>
                                    <div className="grid grid-cols-4 sm:grid-cols-5 gap-2">
                                        {group.members.map(m => <MemberChip key={m.name} m={m} showPartAbbr={group.showPartAbbr} />)}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* 범례 */}
                    <div className="flex items-center gap-4 px-0.5 pt-1 pb-2">
                        <span className="text-[10px] font-bold text-gray-300 uppercase tracking-widest">상태</span>
                        {[['#22c55e','활동중'],['#eab308','단기부재'],['#9ca3af','안식중']].map(([c,l]) => (
                            <span key={l} className="flex items-center gap-1 text-[10px] font-bold text-gray-400">
                                <span className="w-2 h-2 rounded-full" style={{backgroundColor:c}}></span>{l}
                            </span>
                        ))}
                    </div>

                    {/* 시스템 설정 */}
                    {showSettings && (
                        <div className="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm space-y-6 scale-in">
                            <h3 className="text-[10px] font-black text-gray-300 uppercase tracking-widest flex items-center gap-2"><LucideIcon name="settings" className="w-3.5 h-3.5" /> 시스템 설정</h3>
                            <div>
                                <div className="flex items-center justify-between mb-3">
                                    <div>
                                        <p className="text-sm font-bold text-gray-800">매니저 비밀번호 변경</p>
                                        <p className="text-xs text-gray-400">인증용 비밀번호를 변경합니다.</p>
                                    </div>
                                    <button onClick={() => setShowPwdSetting(!showPwdSetting)} className="px-4 py-2 bg-gray-50 text-gray-500 rounded-xl text-xs font-black hover:bg-gray-100 transition-colors">
                                        {showPwdSetting ? "숨기기" : "변경하기"}
                                    </button>
                                </div>
                                {showPwdSetting && (
                                    <div className="space-y-3 scale-in">
                                        <input type="password" placeholder="현재 비밀번호" className="w-full bg-gray-50 p-3 rounded-xl font-bold text-sm outline-none text-center" value={pwdForm.current} onChange={e=>setPwdForm({...pwdForm, current:e.target.value})} />
                                        <input type="password" placeholder="새 비밀번호" className="w-full bg-gray-50 p-3 rounded-xl font-bold text-sm outline-none text-center" value={pwdForm.next} onChange={e=>setPwdForm({...pwdForm, next:e.target.value})} />
                                        <input type="password" placeholder="새 비밀번호 확인" className="w-full bg-gray-50 p-3 rounded-xl font-bold text-sm outline-none text-center" value={pwdForm.confirm} onChange={e=>setPwdForm({...pwdForm, confirm:e.target.value})} />
                                        <button onClick={handleUpdatePassword} className="w-full py-3 bg-[#193278] text-white rounded-xl font-black text-sm shadow-md active:scale-95 transition-transform">비밀번호 저장</button>
                                    </div>
                                )}
                            </div>
                            <div className="border-t border-gray-100 pt-6">
                                <p className="text-sm font-bold text-gray-800 mb-1">AI 출석 인식 (Gemini API)</p>
                                <p className="text-xs text-blue-500 font-bold mb-3">★ 구글 AI Studio에서 발급받은 API 키를 입력하세요.</p>
                                <div className="space-y-3">
                                    <input type="password" placeholder="Gemini API Key" className="w-full bg-gray-50 p-3 rounded-xl font-bold text-sm outline-none text-center" value={apiForm} onChange={e=>setApiForm(e.target.value)} />
                                    <button onClick={() => onSaveGeminiKey(apiForm)} className="w-full py-3 bg-[#193278] text-white rounded-xl font-black text-sm shadow-md active:scale-95 transition-transform">API 키 저장</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 팀원 편집 모달 */}
                    {editingMember !== null && (
                        <MemberEditModal
                            member={editingMember === false ? null : editingMember}
                            onClose={() => setEditingMember(null)}
                            onSave={handleSaveMember}
                            onDelete={() => handleDeleteMember(editingMember.name)}
                        />
                    )}
                </div>
            );
        };

        const AttendanceView = ({ members, onCancel, requestAuth, showToast, geminiApiKey }) => {
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [attendanceMap, setAttendanceMap] = useState({});
            const [previewImage, setPreviewImage] = useState(null);
            const [ocrStatus, setOcrStatus] = useState("idle");
            const [ocrProgress, setOcrProgress] = useState(0);
            const activeMembers = members.filter(m => m && m.status === 'active');
            const fileInputRef = useRef(null);

            const handleImageUpload = async (e) => {
                const file = e.target.files[0]; 
                if (!file) return;
                try {
                    const compressed = await compressImage(file);
                    setPreviewImage(compressed); 
                } catch (err) { 
                    showToast("이미지 업로드에 실패했습니다.");
                } finally { 
                    if (fileInputRef.current) fileInputRef.current.value = ""; 
                }
            };

            const handleRunAI = async () => {
                if (!previewImage) return showToast("먼저 참석 명단 사진 영역을 눌러 업로드해주세요.");

                setOcrStatus("processing"); setOcrProgress(50);
                try {
                    const cropped = await cropImageForOCR(previewImage, 0.45, 0.95); 
                    const extractedText = await recognizeNamesWithGemini(cropped, geminiApiKey);
                    setOcrProgress(100);

                    const cleanText = extractedText.replace(/\s+/g, '');
                    const newMap = { ...attendanceMap };
                    
                    activeMembers.forEach(m => { 
                        if (cleanText.includes(m.name)) newMap[m.name] = true; 
                    });
                    
                    setAttendanceMap(newMap); 
                    setOcrStatus("success"); 
                    showToast("AI 이름 인식이 완료되었습니다.");
                } catch (err) { 
                    setOcrStatus("idle"); 
                    console.error("OCR Error:", err);
                    alert(`[AI 서버 통신 에러]\n\n${err.message}\n\n▶ 조치방법:\n1. 캔버스 환경에서는 API 키를 비워주세요.\n2. 실제 배포 서버에서는 새로 발급한 Gemini API 키가 필수입니다.\n3. 새 키 발급 시 '새 프로젝트'로 생성했는지 확인해주세요.`);
                    showToast("인식에 실패했습니다.");
                }
            };

            const togglePart = (partId) => {
                const partMembers = activeMembers.filter(m => m.part === partId);
                const allSelected = partMembers.every(m => attendanceMap[m.name]);
                const next = { ...attendanceMap };
                if (allSelected) partMembers.forEach(m => delete next[m.name]);
                else partMembers.forEach(m => next[m.name] = true);
                setAttendanceMap(next);
            };

            const handleSave = () => {
                requestAuth(async () => {
                    const { db, collection, addDoc } = window.MyFirebase;
                    const dateStr = date.replace(/-/g, '. ') + '.';
                    const selectedNames = Object.keys(attendanceMap);
                    await addDoc(collection(db, 'history'), { 
                        date: dateStr, count: selectedNames.length, members: selectedNames, image: previewImage, updatedAt: new Date().toISOString() 
                    });
                    showToast("기록 저장 완료"); onCancel();
                });
            };

            return (
                <div className="space-y-6 fade-in pb-10 text-left">
                    <div className="flex items-center justify-between px-1 text-left">
                        <button onClick={onCancel} className="text-gray-400 font-bold flex items-center gap-1 transition-transform active:scale-90 text-center"><LucideIcon name="chevron-left" /> 뒤로</button>
                        <div className="flex flex-col sm:flex-row sm:items-center gap-2 overflow-hidden text-left">
                            <h2 className="text-xl font-black text-gray-800 shrink-0 text-left">새 출석 기록</h2>
                            <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="header-date-input text-left" />
                        </div>
                        <button onClick={handleSave} className="bg-[#193278] text-white px-5 py-2 rounded-xl font-black shadow-lg transition-transform active:scale-95 text-center">저장</button>
                    </div>
                    <section className="bg-white rounded-[32px] p-6 shadow-sm border border-gray-50 overflow-hidden text-left">
                        <div className="flex items-center justify-between mb-4 text-left"><h3 className="font-bold text-gray-800 flex items-center gap-2 text-left"><LucideIcon name="camera" className="w-5 h-5 text-blue-500 text-left" /> 팀원 인식</h3></div>
                        
                        <div className="flex flex-col gap-2 mb-4">
                            <button onClick={handleRunAI} disabled={ocrStatus === 'processing' || !previewImage} className="w-full bg-purple-50 text-purple-600 py-3 px-4 rounded-2xl font-black transition-transform active:scale-95 flex justify-center items-center gap-2 hover:bg-purple-100 border border-purple-100 disabled:opacity-50">
                                {ocrStatus === 'processing' ? <div className="w-5 h-5 border-2 border-purple-600 border-t-transparent rounded-full animate-spin"></div> : <LucideIcon name="sparkles" className="w-5 h-5" />}
                                {ocrStatus === 'processing' ? "AI 이름 인식 중..." : "AI 자동 출석 체크"}
                            </button>
                        </div>

                        <div className="relative border-2 border-dashed border-gray-200 rounded-3xl p-4 min-h-[160px] flex flex-col items-center justify-center transition-all hover:bg-gray-50 text-center cursor-pointer">
                            {previewImage ? (
                                <div className="w-full relative text-center">
                                    <img src={previewImage} className="w-full max-h-48 object-contain rounded-2xl mx-auto text-center" />
                                    {ocrStatus === "processing" && (
                                        <div className="absolute inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center p-6 rounded-2xl text-center">
                                            <div className="w-full bg-gray-100 h-2 rounded-full mb-3 overflow-hidden max-w-xs mx-auto text-center"><div className="bg-[#193278] h-full progress-bar-fill" style={{ width: `${ocrProgress}%` }}></div></div>
                                            <p className="text-[#193278] font-bold text-[10px] animate-pulse text-center">명단 인식 중... {ocrProgress}%</p>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="text-center p-4 text-center text-center">
                                    <LucideIcon name="image-plus" className="w-8 h-8 text-gray-300 mx-auto mb-2 text-center" />
                                    <p className="text-gray-400 text-xs font-bold text-center">여기를 눌러 참석 명단 사진을 업로드하세요</p>
                                </div>
                            )}
                            <input ref={fileInputRef} type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer text-left" onChange={handleImageUpload} disabled={ocrStatus === "processing"} />
                        </div>
                    </section>
                    <div className="bg-white p-6 rounded-[32px] shadow-sm border border-gray-50 text-left">
                        <div className="space-y-8 text-left text-left">
                            {['staff', ...PARTS.map(p=>p.id)].map(partId => {
                                const list = activeMembers.filter(m => m.part === partId);
                                if (list.length === 0) return null;
                                
                                const checkedCount = list.filter(m => attendanceMap[m.name]).length;
                                
                                return (
                                    <div key={partId} className="text-left">
                                        <div className="flex items-center justify-between mb-3 text-left">
                                            <h4 className="text-[10px] font-black text-gray-300 uppercase tracking-widest flex items-center gap-2 text-left">
                                                <span className="w-1 h-3 rounded-full text-left" style={{backgroundColor: partId === 'staff' ? '#193278' : (PARTS.find(p=>p.id===partId)?.color || '#ccc')}}></span>
                                                {partId === 'staff' ? '성가사 & 반주자' : (PARTS.find(p=>p.id===partId)?.name)}
                                                <span className="ml-1 text-[#193278] bg-blue-50 px-2 py-0.5 rounded-full text-[9px] font-black">({checkedCount}/{list.length})</span>
                                            </h4>
                                            <button onClick={() => togglePart(partId)} className="text-[10px] font-black text-gray-400 border border-gray-100 px-2 py-0.5 rounded-full hover:bg-gray-50 transition-colors text-center text-center text-center text-center text-center">전체</button>
                                        </div>
                                        <div className="grid grid-cols-3 sm:grid-cols-4 gap-2 text-center text-center text-center text-center">
                                            {list.map(m => (
                                                <button key={m.name} onClick={() => { const n = {...attendanceMap}; if(n[m.name]) delete n[m.name]; else n[m.name]=true; setAttendanceMap(n); }} className={`py-3.5 px-1 rounded-2xl text-[13px] font-bold border transition-all text-center ${attendanceMap[m.name] ? 'bg-[#193278] border-[#193278] text-white shadow-md' : 'bg-gray-50 border-gray-100 text-gray-400 active:scale-95'}`}>{m.name}</button>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [ready, setReady] = useState(false);
            const [activeTab, setActiveTab] = useState('music'); 
            const [members, setMembers] = useState([]);
            const [history, setHistory] = useState([]);
            const [songs, setSongs] = useState([]);
            const [videos, setVideos] = useState([]);
            const [showInterestModal, setShowInterestModal] = useState(false);
            const [editingHistory, setEditingHistory] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [user, setUser] = useState(null);
            const [masterPassword, setMasterPassword] = useState("onnurigrace");
            const [geminiApiKey, setGeminiApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
            const [isNavVisible, setIsNavVisible] = useState(true);
            const lastScrollY = useRef(0);

            const [toast, setToast] = useState({ show: false, msg: '' });
            const [authModal, setAuthModal] = useState({ isOpen: false, onConfirm: null });
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', msg: '', onConfirm: null });

            useEffect(() => {
                const waitFirebase = setInterval(() => { 
                    if (window.FB_READY && window.MyFirebase) { 
                        clearInterval(waitFirebase); initApp(); 
                    } 
                }, 100);
                return () => clearInterval(waitFirebase);
            }, []);

            const initApp = async () => {
                const { auth, db, doc, collection, onSnapshot, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window.MyFirebase;
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try { await signInWithCustomToken(auth, __initial_auth_token); } catch (e) { await signInAnonymously(auth); }
                    } else { await signInAnonymously(auth); }

                    onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        if (u) {
                            onSnapshot(doc(db, 'settings', 'admin'), (s) => {
                                if (s.exists() && s.data().password) {
                                    setMasterPassword(s.data().password);
                                }
                            });
                            
                            onSnapshot(doc(db, 'roster', 'current'), (s) => s.exists() && setMembers(s.data().list));
                            onSnapshot(collection(db, 'history'), (s) => {
                                const list = []; s.forEach(d => list.push({ id: d.id, ...d.data() }));
                                list.sort((a, b) => new Date(b.date.replace(/\. /g, '-').replace(/\.$/, '')) - new Date(a.date.replace(/\. /g, '-').replace(/\.$/, '')));
                                setHistory(list);
                            });
                            onSnapshot(collection(db, 'music'), (s) => {
                                const list = []; s.forEach(d => list.push({ id: d.id, ...d.data() }));
                                list.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
                                setSongs(list);
                            });
                            onSnapshot(collection(db, 'videos'), (s) => {
                                const list = []; s.forEach(d => list.push({ id: d.id, ...d.data() }));
                                list.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
                                setVideos(list);
                            });
                            setReady(true);
                        }
                    });
                } catch (e) { console.error(e); }
            };

            const showToast = (msg) => { setToast({ show: true, msg }); setTimeout(() => setToast({ show: false, msg: '' }), 3000); };
            const requestAuth = (callback) => { if (isAdmin) { callback(); } else { setAuthModal({ isOpen: true, onConfirm: callback }); } };
            const askConfirm = (title, msg, onConfirm) => setConfirmModal({ isOpen: true, title, msg, onConfirm });
            
            const handleShare = () => {
                const dummy = document.createElement("textarea"); dummy.value = SHARE_LINK; document.body.appendChild(dummy); dummy.select(); document.execCommand('copy'); document.body.removeChild(dummy);
                showToast("공유 링크가 복사되었습니다!");
            };
            
            const handleTabChange = (id) => { 
                setIsNavVisible(true);
                if (id === 'manage') { requestAuth(() => setActiveTab(id)); } else { setActiveTab(id); } 
            };
            
            const handleSaveGeminiKey = (key) => {
                const cleanKey = key.trim();
                setGeminiApiKey(cleanKey);
                localStorage.setItem('gemini_api_key', cleanKey);
                showToast("API 키가 브라우저에 안전하게 저장되었습니다.");
            };

            const handleScroll = (e) => {
                const currentScrollY = e.target.scrollTop;
                if (currentScrollY <= 0) {
                    setIsNavVisible(true);
                    lastScrollY.current = currentScrollY;
                    return;
                }
                if (currentScrollY > lastScrollY.current + 10) {
                    setIsNavVisible(false);
                } else if (currentScrollY < lastScrollY.current - 10) {
                    setIsNavVisible(true);
                }
                lastScrollY.current = currentScrollY;
            };

            const sortedMembers = useMemo(() => {
                const safeMembers = members || [];
                return [...safeMembers].sort((a, b) => {
                    if (a && a.name === "박용규") return -1;
                    if (b && b.name === "박용규") return 1;
                    if (a && b && a.name && b.name) return a.name.localeCompare(b.name, 'ko');
                    return 0;
                });
            }, [members]);

            if (!ready) return <div className="h-screen flex items-center justify-center bg-[#f8faff] text-center text-center text-center text-center"><div className="w-10 h-10 border-4 border-blue-100 border-t-[#193278] rounded-full animate-spin"></div></div>;

            return (
                <div className="flex h-screen bg-[#f8faff] overflow-hidden text-left w-full text-left">
                    <aside className="hidden md:flex flex-col w-64 bg-white border-r border-gray-100 p-6 z-10 shrink-0 text-left text-left text-left text-left">
                        <div className="mb-10 flex items-center gap-3 text-left text-left text-left text-left">
                            <AppLogo className="w-10 h-10 text-left text-left text-left text-left" />
                            <div className="text-left text-left text-left text-left">
                                <h1 onClick={() => setActiveTab('music')} className="text-xl font-black text-[#193278] tracking-tight cursor-pointer hover:opacity-80 transition-opacity">주은혜 찬양사역팀</h1>
                                <div className="text-[10px] mt-0.5 text-gray-400 font-bold uppercase tracking-widest flex items-center gap-1 text-left text-left">
                                    <span className={`w-2 h-2 rounded-full text-left text-left text-left text-left ${isAdmin ? 'bg-blue-500 animate-pulse' : 'bg-green-500'}`}></span> 
                                    {isAdmin ? 'ADMIN SESSION ACTIVE' : 'ONLINE MODE'}
                                </div>
                            </div>
                        </div>
                        <nav className="flex-1 space-y-2 text-left text-left text-left">
                            <NavBtn id="music" label="성가음원&악보" icon="music-2" active={activeTab === 'music'} onClick={handleTabChange} />
                            <NavBtn id="videos" label="찬양팀영상" icon="play-circle" active={activeTab === 'videos'} onClick={handleTabChange} />
                            <NavBtn id="stats" label="출석현황판" icon="bar-chart-2" active={activeTab === 'stats' || activeTab === 'attendance'} onClick={handleTabChange} />
                            <div className="pt-6 pb-2 text-[10px] font-black text-gray-300 uppercase tracking-widest px-4 text-left text-left text-left">매니저 영역</div>
                            <NavBtn id="manage" label="명단관리" icon="user-round" active={activeTab === 'manage'} onClick={handleTabChange} />
                        </nav>
                        <div className="mt-auto space-y-2 text-left text-left text-left text-left">
                            <button onClick={handleShare} className="w-full flex items-center justify-center gap-2 py-3 bg-blue-50 text-blue-600 rounded-xl text-xs font-bold active:scale-95 transition-all text-center"><LucideIcon name="share-2" className="w-3.5 h-3.5 mr-2" /> 링크 공유</button>
                            {isAdmin && (
                                <button onClick={() => window.location.reload()} className="w-full flex items-center justify-center gap-2 py-3 bg-red-50 text-red-600 rounded-xl text-xs font-bold active:scale-95 transition-all text-center">
                                    <LucideIcon name="log-out" className="w-3.5 h-3.5 mr-2" /> 관리 세션 종료
                                </button>
                            )}
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col min-h-0 overflow-hidden relative bg-[#f8faff] text-left text-left text-left text-left">
                        <header className={`md:hidden absolute top-0 left-0 right-0 bg-white px-5 h-16 flex items-center justify-between border-b border-gray-100 shrink-0 z-30 transition-transform duration-300 ${isNavVisible ? 'translate-y-0' : '-translate-y-full'}`}>
                            <div onClick={() => setActiveTab('music')} className="flex items-center gap-2 cursor-pointer text-left text-left">
                                <AppLogo className="w-8 h-8 text-left text-left text-left text-left" />
                                <span className="font-black text-lg text-[#193278] text-left text-left text-left text-left">주은혜 찬양사역팀</span>
                            </div>
                            <div className="flex items-center gap-2 text-left text-left text-left text-left">
                                <button onClick={handleShare} className="p-2 text-blue-500 transition-transform active:scale-90" title="공유"><LucideIcon name="share-2" className="w-5 h-5 text-left text-left" /></button>
                                <button onClick={() => handleTabChange('manage')} className={`p-2 rounded-full transition-transform active:scale-90 text-left text-left ${activeTab === 'manage' ? 'text-blue-600 bg-blue-50' : 'text-gray-400'}`} title="명단관리"><LucideIcon name="user-round" className="w-5 h-5 text-left text-left" /></button>
                                {isAdmin && (
                                    <button onClick={() => window.location.reload()} className="p-2 text-red-500 transition-transform active:scale-90 text-left text-left" title="세션 종료"><LucideIcon name="log-out" className="w-5 h-5 text-left text-left" /></button>
                                )}
                            </div>
                        </header>

                        <div className="flex-1 scroll-container p-4 pt-20 md:p-10 pb-32 md:pb-10 hide-scrollbar min-h-0 w-full overflow-x-hidden text-left text-left text-left text-left" onScroll={handleScroll}>
                            <div className="max-w-4xl mx-auto w-full text-left text-left text-left text-left">
                                {activeTab === 'stats' && <StatsView history={history} members={sortedMembers} onAddAttendance={() => requestAuth(() => setActiveTab('attendance'))} onOpenInterest={() => setShowInterestModal(true)} onDetail={(h) => setEditingHistory(h)} requestAuth={requestAuth} askConfirm={askConfirm} showToast={showToast} />}
                                {activeTab === 'music' && <MusicView songs={songs} requestAuth={requestAuth} askConfirm={askConfirm} showToast={showToast} isAdmin={isAdmin} geminiApiKey={geminiApiKey} />}
                                {activeTab === 'videos' && <VideoView videos={videos} requestAuth={requestAuth} askConfirm={askConfirm} showToast={showToast} isAdmin={isAdmin} />}
                                {activeTab === 'manage' && <ManageView members={sortedMembers} currentPassword={masterPassword} requestAuth={requestAuth} showToast={showToast} geminiApiKey={geminiApiKey} onSaveGeminiKey={handleSaveGeminiKey} />}
                                {activeTab === 'attendance' && <AttendanceView members={sortedMembers} onCancel={() => setActiveTab('stats')} requestAuth={requestAuth} showToast={showToast} geminiApiKey={geminiApiKey} />}
                            </div>
                        </div>

                        <nav className={`md:hidden fixed bottom-0 left-0 right-0 h-20 bg-white border-t border-gray-100 flex items-center justify-around px-2 z-50 shadow-[0_-10px_20px_rgba(0,0,0,0.03)] transition-transform duration-300 ${isNavVisible ? 'translate-y-0' : 'translate-y-full'}`}>
                            <NavIconBtn id="music" icon="music-2" label="음원" active={activeTab === 'music'} onClick={handleTabChange} />
                            <NavIconBtn id="videos" icon="play-circle" label="영상" active={activeTab === 'videos'} onClick={handleTabChange} />
                            <NavIconBtn id="stats" icon="bar-chart-2" label="출석" active={activeTab === 'stats' || activeTab === 'attendance'} onClick={handleTabChange} />
                        </nav>
                    </main>

                    {showInterestModal && <InterestModal members={sortedMembers} history={history} onClose={() => setShowInterestModal(false)} />}
                    {editingHistory && <HistoryDetailModal record={editingHistory} allMembers={sortedMembers} requestAuth={requestAuth} onClose={() => setEditingHistory(null)} geminiApiKey={geminiApiKey} onSave={async (updated) => { 
                        const { db, doc, setDoc } = window.MyFirebase;
                        await setDoc(doc(db, 'history', updated.id), updated);
                        showToast("수정되었습니다."); setEditingHistory(null);
                    }} onDelete={(id) => {
                        askConfirm("기록 삭제", "정말 삭제하시겠습니까?", async () => {
                            const { db, doc, deleteDoc } = window.MyFirebase;
                            await deleteDoc(doc(db, 'history', id)); showToast("삭제되었습니다."); setEditingHistory(null);
                        });
                    }} showToast={showToast} />}
                    {authModal.isOpen && <AuthModal correctPassword={masterPassword} onClose={() => setAuthModal({ ...authModal, isOpen: false })} onConfirm={() => { setIsAdmin(true); setAuthModal({ ...authModal, isOpen: false }); authModal.onConfirm(); }} />}
                    {confirmModal.isOpen && <ConfirmModal modal={confirmModal} onClose={() => setConfirmModal({ ...confirmModal, isOpen: false })} />}
                    {toast.show && <div className="fixed bottom-24 md:bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-bold z-[300] shadow-xl animate-bounce text-center text-center text-left text-left text-left">{toast.msg}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
