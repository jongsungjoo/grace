<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

</style>
</head>
<body class="bg-gray-50 min-h-screen p-4">

<div class="max-w-2xl mx-auto">

    <h1 class="text-2xl font-black text-gray-800 mb-1">🎂 생일 일괄 업데이트</h1>
    <p class="text-sm text-gray-400 font-bold">주은혜 생일자 명단 → Firebase 자동 입력</p>
  </div>

  <div id="status" class="bg-blue-50 border border-blue-100 rounded-2xl p-4 mb-4 text-sm font-bold text-blue-600">
    Firebase 연결 중...
  </div>

  <div id="preview" class="hidden space-y-2 mb-4"></div>

  <div class="flex gap-3">
    <button id="btnPreview" onclick="loadPreview()" disabled
      class="flex-1 bg-gray-100 text-gray-400 py-4 rounded-2xl font-black text-sm transition-all">
      미리보기 로드
    </button>
    <button id="btnRun" onclick="runUpdate()" disabled
      class="flex-[2] bg-[#193278] text-white py-4 rounded-2xl font-black text-sm shadow-lg transition-all opacity-50">
      🚀 일괄 업데이트 실행
    </button>
  </div>

  <div id="log" class="mt-4 bg-gray-900 text-green-400 rounded-2xl p-4 font-mono text-xs hidden max-h-64 overflow-y-auto"></div>
</div>

<script type="module">

import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDribbbOpi9VcnLu3szJZnT06R4dhx9eww",
  authDomain: "onnuri-grace.firebaseapp.com",
  projectId: "onnuri-grace",
  storageBucket: "onnuri-grace.firebasestorage.app",
  messagingSenderId: "349044849326",

  // 3월
  { name: "기민정",  birthday: "03-02", birthdayType: "solar" },
  { name: "최경분",  birthday: "03-02", birthdayType: "solar", lunarBirthday: "03-02" },
  { name: "소종욱",  birthday: "03-12", birthdayType: "solar" },
  { name: "이효종",  birthday: "03-14", birthdayType: "solar" },

  { name: "박은영",  birthday: "03-15", birthdayType: "solar" },

  { name: "우연경",  birthday: "04-07", birthdayType: "solar" },

  { name: "김승택",  birthday: "04-19", birthdayType: "solar" },
  { name: "정윤조",  birthday: "04-22", birthdayType: "solar" },

  // 5월
  { name: "김정경",  birthday: "05-01", birthdayType: "solar" },
  { name: "김두환",  birthday: "05-02", birthdayType: "solar" },
  { name: "이현희",  birthday: "05-07", birthdayType: "solar" },

  { name: "정지영",  birthday: "05-08", birthdayType: "solar", lunarBirthday: "04-10" },

  // 9월
  { name: "오정근",  birthday: "09-04", birthdayType: "solar" },
  { name: "신성균",  birthday: "09-14", birthdayType: "solar" },

  // 10월
  { name: "한정아",  birthday: "10-04", birthdayType: "solar" },
  { name: "유인실",  birthday: "10-10", birthdayType: "solar" },

  { name: "윤용종",  birthday: "10-11", birthdayType: "solar" },
  { name: "김지혜",  birthday: "10-29", birthdayType: "solar" },
  { name: "김인숙",  birthday: "10-30", birthdayType: "solar" },
  // 11월
  { name: "노영진",  birthday: "11-03", birthdayType: "solar", lunarBirthday: "10-09" },
  { name: "한광희",  birthday: "11-05", birthdayType: "solar", lunarBirthday: "10-06" },
  { name: "한구용",  birthday: "11-14", birthdayType: "solar" },
  { name: "김혜정",  birthday: "11-23", birthdayType: "solar" },
  // 12월
  { name: "조윤석",  birthday: "12-01", birthdayType: "solar" },
  { name: "주종성",  birthday: "12-04", birthdayType: "solar" },
  { name: "김자선",  birthday: "12-15", birthdayType: "solar" },
  { name: "남혜경",  birthday: "12-15", birthdayType: "solar" },
  { name: "조은미",  birthday: "12-20", birthdayType: "solar" },
  { name: "홍용찬",  birthday: "12-24", birthdayType: "solar" },
];

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let rosterData = null;
let matchResult = [];

function setStatus(msg, color = "blue") {
  const el = document.getElementById("status");
  const colors = { blue: "bg-blue-50 border-blue-100 text-blue-600", green: "bg-green-50 border-green-100 text-green-600", red: "bg-red-50 border-red-100 text-red-600", yellow: "bg-yellow-50 border-yellow-100 text-yellow-700" };
  el.className = `border rounded-2xl p-4 mb-4 text-sm font-bold ${colors[color]}`;
  el.textContent = msg;
}

function addLog(msg) {
  const el = document.getElementById("log");
  el.classList.remove("hidden");
  el.textContent += msg + "\n";
  el.scrollTop = el.scrollHeight;
}

// Firebase 연결
try {
  await signInAnonymously(auth);
  const snap = await getDoc(doc(db, "roster", "current"));
  if (snap.exists()) {
    rosterData = snap.data().list || [];
    setStatus(`✅ 연결 성공 — 현재 멤버 ${rosterData.length}명 로드됨`, "green");
    document.getElementById("btnPreview").disabled = false;
    document.getElementById("btnPreview").className = "flex-1 bg-gray-800 text-white py-4 rounded-2xl font-black text-sm transition-all active:scale-95";
  }
} catch(e) {
  setStatus("❌ Firebase 연결 실패: " + e.message, "red");
}

window.loadPreview = function() {
  if (!rosterData) return;
  matchResult = [];
  const notFound = [];

  for (const bd of BIRTHDAY_DATA) {
    const member = rosterData.find(m => m.name === bd.name);
    if (member) {
      matchResult.push({ member, bd, existing: { birthday: member.birthday || "", birthdayType: member.birthdayType || "" } });
    } else {
      notFound.push(bd.name);
    }
  }

  const preview = document.getElementById("preview");
  preview.innerHTML = "";
  preview.classList.remove("hidden");

  // 요약 카드
  const summary = document.createElement("div");
  summary.className = "bg-white rounded-2xl p-4 border border-gray-100 shadow-sm mb-2";
  summary.innerHTML = `
    <p class="font-black text-gray-800 mb-1">📊 매칭 결과</p>
    <p class="text-sm text-gray-500">✅ 매칭 성공: <strong class="text-green-600">${matchResult.length}명</strong></p>
    <p class="text-sm text-gray-500">❌ 미매칭 (명단에 없음): <strong class="text-red-500">${notFound.length}명</strong>${notFound.length > 0 ? ' — ' + notFound.join(', ') : ''}</p>
  `;
  preview.appendChild(summary);

  // 매칭된 목록
  for (const r of matchResult) {
    const row = document.createElement("div");
    const hasLunar = r.bd.lunarBirthday ? ` <span class='text-purple-500 ml-1'>🌙 음${r.bd.lunarBirthday}</span>` : "";
    row.className = "bg-white rounded-xl px-4 py-3 border border-gray-50 flex items-center justify-between text-sm";
    row.innerHTML = `
      <span class="font-black text-gray-700 w-16">${r.bd.name}</span>
      <span class="text-blue-600 font-bold flex-1">☀️ ${r.bd.birthday}${hasLunar}</span>
      ${r.existing.birthday ? `<span class="text-[10px] text-gray-300">기존: ${r.existing.birthday}</span>` : '<span class="text-[10px] text-emerald-400 font-bold">NEW</span>'}
    `;
    preview.appendChild(row);
  }

  document.getElementById("btnRun").disabled = false;
  document.getElementById("btnRun").className = "flex-[2] bg-[#193278] text-white py-4 rounded-2xl font-black text-sm shadow-lg transition-all active:scale-95";
  setStatus(`미리보기 완료 — ${matchResult.length}명 업데이트 준비됨. 아래 버튼으로 실행하세요.`, "yellow");
};

window.runUpdate = async function() {
  if (matchResult.length === 0) return;
  document.getElementById("btnRun").disabled = true;
  document.getElementById("btnRun").textContent = "업데이트 중...";

  let updated = 0;
  const newList = rosterData.map(m => {
    const bd = matchResult.find(r => r.member.name === m.name);
    if (bd) {
      updated++;
      addLog(`✅ ${m.name} → ${bd.bd.birthday} (${bd.bd.birthdayType === 'solar' ? '양력' : '음력'})`);
      return {
        ...m,
        birthday: bd.bd.birthday,
        birthdayType: bd.bd.birthdayType,
        ...(bd.bd.lunarBirthday ? { lunarBirthday: bd.bd.lunarBirthday } : {}),
      };
    }
    return m;
  });

  try {
    await setDoc(doc(db, "roster", "current"), { list: newList });
    setStatus(`🎉 완료! ${updated}명의 생일 정보가 업데이트되었습니다.`, "green");
    document.getElementById("btnRun").textContent = "✅ 완료";
    addLog(`\n총 ${updated}명 업데이트 완료.`);
  } catch(e) {
    setStatus("❌ 저장 실패: " + e.message, "red");
    addLog("ERROR: " + e.message);
  }
};
</script>
</body>
</html>
