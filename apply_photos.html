const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const log = (msg, type='info') => {
    const el = document.getElementById('log');
    const line = document.createElement('div');
    line.style.color = type === 'error' ? '#f87171' : type === 'success' ? '#4ade80' : type === 'warn' ? '#fbbf24' : '#e2e8f0';
    line.textContent = msg;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
};

const updateProgress = (cur, total) => {
    const pct = Math.round(cur/total*100);
    document.getElementById('progress').style.width = pct + '%';
    document.getElementById('pct').textContent = `${cur}/${total} (${pct}%)`;
};

document.getElementById('startBtn').onclick = async () => {
    document.getElementById('startBtn').disabled = true;
    log('🔐 Firebase 인증 중...');
    try {
        await signInAnonymously(auth);
        log('✅ 인증 성공');
        
        log('📥 현재 roster 불러오는 중...');
        const snap = await getDoc(doc(db, 'roster', 'current'));
        if (!snap.exists()) { log('❌ roster/current 문서가 없습니다', 'error'); return; }
        
        const roster = snap.data().list || [];
        log(`👥 총 ${roster.length}명 확인`, 'success');
        
        let matched = 0, skipped = 0;
        const updated = roster.map(member => {
            const photo = PHOTOS[member.name];
            if (photo) {
                matched++;
                return { ...member, photo };
            } else {
                skipped++;
                return member;
            }
        });
        
        log(`🖼️ 매칭 성공: ${matched}명, 사진 없음: ${skipped}명`, matched > 0 ? 'success' : 'warn');
        
        if (matched === 0) {
            log('⚠️ 매칭된 멤버가 없습니다. 이름을 확인하세요.', 'warn');
            document.getElementById('startBtn').disabled = false;
            return;
        }
        
        log('💾 Firebase에 저장 중...');
        updateProgress(0, 1);
        await setDoc(doc(db, 'roster', 'current'), { list: updated });
        updateProgress(1, 1);
        
        log(`🎉 완료! ${matched}명의 프로필 사진이 업데이트되었습니다.`, 'success');
        if (skipped > 0) log(`ℹ️ ${skipped}명은 사진 데이터가 없어 건너뜠습니다 (새 멤버 등)`, 'warn');
        log('👉 앱을 새로고침하면 반영됩니다.');
    } catch(e) {
        log('❌ 오류: ' + e.message, 'error');
        document.getElementById('startBtn').disabled = false;
    }
};

// 미리보기 렌더링
window.onload = () => {
    const container = document.getElementById('preview');
    const names = Object.keys(PHOTOS);
    names.forEach(name => {
        const div = document.createElement('div');
        div.style.cssText = 'text-align:center;';
        const img = document.createElement('img');
        img.src = PHOTOS[name];
        img.style.cssText = 'width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid #334155;';
        const label = document.createElement('div');
        label.style.cssText = 'font-size:10px;color:#94a3b8;margin-top:2px;';
        label.textContent = name;
        div.appendChild(img);
        div.appendChild(label);
        container.appendChild(div);
    });
    document.getElementById('photoCount').textContent = names.length;
};
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
h1 { font-size: 1.3rem; color: #60a5fa; margin-bottom: 16px; }
.card { background: #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px;
          font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; }
button:disabled { background: #475569; cursor: not-allowed; }
#progress-wrap { background: #334155; border-radius: 4px; height: 8px; margin-top: 12px; }
#progress { background: #22c55e; height: 8px; border-radius: 4px; width: 0; transition: width 0.3s; }
#pct { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }
#log { background: #0f172a; border-radius: 8px; padding: 12px; height: 200px; overflow-y: auto;
        font-family: monospace; font-size: 0.8rem; margin-top: 12px; }
#preview { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 8px; max-height: 300px; overflow-y: auto; }
.stat { color: #60a5fa; font-weight: bold; }
</style>
</head>
<body>
<h1>🎵 찬양팀 사진 일괄 적용 도구</h1>

<div class="card">
    <div style="margin-bottom:12px;">준비된 사진: <span class="stat" id="photoCount">0</span>명 (240×240px, 원형 crop)</div>
    <button id="startBtn">🚀 Firebase에 일괄 적용 시작</button>
    <div id="progress-wrap"><div id="progress"></div></div>
    <div id="pct"></div>
    <div id="log"></div>
</div>

<div class="card">
    <div style="margin-bottom:8px;color:#94a3b8;font-size:0.85rem;">사진 미리보기</div>
    <div id="preview"></div>
</div>
</body>
</html>
